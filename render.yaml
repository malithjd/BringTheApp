services:
  - type: web
    name: bringtheapp
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VISION_PROVIDER
        sync: false  # set manually in dashboard
      - key: GOOGLE_AI_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-20250514
      - key: AUTO_DEV_API_KEY
        sync: false
      - key: PAID_FEATURES
        value: "true"
    healthCheckPath: /api/health
    autoDeploy: true
